services:
  camoufox:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${CAMOUFOX_PORT:-8000}:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    shm_size: "1gb"
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - camoufox_cache:/root/.cache/camoufox

volumes:
  camoufox_cache:
